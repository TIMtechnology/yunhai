services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SCENIC_SPOTS_DIR=/app/data/scenic-spots
      - CLOUDSEA_ENABLED=true
      - CLOUDSEA_ADMIN_TOKEN=dev-token
      - CLOUDSEA_DB_PATH=/app/data/cloudsea/cloudsea.db
    volumes:
      - ./data/scenic-spots:/app/data/scenic-spots:ro
      - ./data/cloudsea:/app/data/cloudsea
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
