services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SCENIC_SPOTS_DIR=/app/data/scenic-spots
      - TERRAIN_SNAPSHOTS_DIR=/app/data/terrain
      - CLOUDSEA_ENABLED=true
      - CLOUDSEA_ADMIN_TOKEN=dev-token
      - CLOUDSEA_DB_PATH=/app/data/cloudsea/cloudsea.db
    volumes:
      - ./data/scenic-spots:/app/data/scenic-spots:ro
      - ./data/terrain:/app/data/terrain:ro
      - ./data/cloudsea:/app/data/cloudsea
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
