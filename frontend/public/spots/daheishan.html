<body>
  <main>
    <p><a href="/">← 返回云海预测工具</a></p>
    <section class="card">
      <h1>大黑山日出云海预报</h1>
      <p>大黑山是大连周边常见日出拍摄点。系统会结合未来 5 天逐小时温度、湿度、降水、低云、中云、能见度和风场，给出日出与云海观测概率。</p>
      <p><a class="cta" href="/?spot=daheishan">查看大黑山实时预测</a></p>
    </section>
    <section class="card">
      <h2>适合关注的气象条件</h2>
      <div class="grid">
        <div class="pill"><strong>日出窗口</strong><br />重点看 03:00-07:00</div>
        <div class="pill"><strong>云层结构</strong><br />低云和中云决定遮挡与云海形态</div>
        <div class="pill"><strong>风场</strong><br />风速过大时云雾层更难稳定维持</div>
      </div>
    </section>
    <section class="card">
      <h2>如何使用预测结果</h2>
      <p>进入实时预测后，可以查看 Meteogram 气象详图、规则因子和分享图。若日出概率高但云海概率低，更适合按日出拍摄计划准备；若云海概率和综合评分同时较高，则更值得提前出发蹲守。</p>
    </section>
  </main>
